<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Souza Moacir | Controle Financeiro</title>
    <style>
        /* Estilo Sênior: Interface limpa e focada */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: white;
            z-index: 999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Tela de carregamento enquanto o Script do Google processa -->
    <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <p style="color: #555; margin-top: 15px;">Conectando ao sistema seguro...</p>
    </div>

    <!-- Seu link do Google Sheets implantado -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbx-jYWUup4Agmdeq61Zw2Q5GY4cC-s3miqbV_DT-7nNKhrZwqd7tLIjpVMVTmas6bhc/exec" 
        onload="document.getElementById('loader').style.display='none';">
    </iframe>

</body>
</html>
