<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <link href="https://jsdelivr.net" rel="stylesheet">
  <style>
    body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; padding-top: 10px; }
    .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .dash-box { background: white; border-radius: 12px; padding: 12px; text-align: center; border-bottom: 4px solid #0d6efd; }
    .btn-save { padding: 15px; font-weight: bold; border-radius: 10px; }
  </style>
</head>
<body>

<div class="container">
  <!-- DASHBOARD -->
  <div class="row g-2 mb-3">
    <div class="col-6">
      <div class="dash-box shadow-sm">
        <small class="text-muted d-block">Ganhos</small>
        <span class="text-success fw-bold" id="res-receita">R$ 0,00</span>
      </div>
    </div>
    <div class="col-6">
      <div class="dash-box shadow-sm">
        <small class="text-muted d-block">Sobra</small>
        <span class="text-primary fw-bold" id="res-sobra">R$ 0,00</span>
      </div>
    </div>
  </div>

  <!-- FORMULÁRIO -->
  <div class="card p-4">
    <h5 class="fw-bold mb-3 text-center">💳 Novo Registro</h5>
    <form id="financeForm">
      <div class="mb-3">
        <label class="form-label small fw-bold">Categoria</label>
        <select class="form-select" id="categoria" required>
          <option value="CONTA CONSUMO">CONTA CONSUMO (Luz/Água/Net)</option>
          <option value="FATURA CARTÃO">FATURA (Crédito/Assinaturas)</option>
          <option value="TÍTULO/BOLETO">TÍTULO (IPTU/Detran/Boletos)</option>
          <option value="RECEBIMENTO">RECEBIMENTO (Salário/Aluguel)</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-bold">Descrição</label>
        <input type="text" class="form-control" id="descricao" placeholder="Ex: CELESC, NUBANK, PIX" required>
      </div>

      <div class="row">
        <div class="col-6 mb-3">
          <label class="form-label small fw-bold">Valor (R$)</label>
          <input type="number" step="0.01" class="form-control" id="valor" required>
        </div>
        <div class="col-6 mb-3">
          <label class="form-label small fw-bold">Meio</label>
          <select class="form-select" id="meioPagamento">
            <option value="DÉBITO">DÉBITO</option>
            <option value="CRÉDITO">CRÉDITO</option>
            <option value="PIX">PIX</option>
            <option value="DINHEIRO">DINHEIRO</option>
          </select>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-bold">Mês Referência</label>
        <select class="form-select" id="mesRef"></select>
      </div>

      <button type="submit" class="btn btn-primary btn-save w-100 shadow">SALVAR NA PLANILHA</button>
    </form>
    <div id="status" class="mt-3 text-center small fw-bold"></div>
  </div>
</div>

<script>
  window.onload = () => { carregarDash(); popularMeses(); };

  function popularMeses() {
    const sel = document.getElementById('mesRef');
    const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    const hoje = new Date();
    for (let i = 0; i < 12; i++) {
      let opt = document.createElement('option');
      opt.value = `${meses[i]}/${hoje.getFullYear()}`;
      opt.innerText = opt.value;
      if(i === hoje.getMonth()) opt.selected = true;
      sel.appendChild(opt);
    }
  }

  function carregarDash() {
    google.script.run.withSuccessHandler(res => {
      document.getElementById('res-receita').innerText = "R$ " + parseFloat(res.receita).toLocaleString('pt-BR');
      document.getElementById('res-sobra').innerText = "R$ " + parseFloat(res.sobra).toLocaleString('pt-BR');
    }).carregarDashboard();
  }

  document.getElementById('financeForm').onsubmit = function(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    
    const dados = {
      categoria: document.getElementById('categoria').value,
      descricao: document.getElementById('descricao').value,
      valor: document.getElementById('valor').value,
      meioPagamento: document.getElementById('meioPagamento').value,
      mesRef: document.getElementById('mesRef').value
    };

    google.script.run.withSuccessHandler(res => {
      alert(res.msg);
      document.getElementById('descricao').value = "";
      document.getElementById('valor').value = "";
      btn.disabled = false;
      carregarDash();
    }).salvarDados(dados);
  };
</script>
</body>
</html>
